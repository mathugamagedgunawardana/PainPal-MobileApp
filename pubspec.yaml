name: painpal
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  image_picker: ^1.1.2
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  sqflite: ^2.4.0

  # HTTP & Networking
  dio: ^5.4.0
  web_socket_channel: ^3.0.1

  # State Management
  provider: ^6.1.0

  # Utils
  uuid: ^4.0.0
  intl: ^0.19.0

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Google Generative AI (Gemini)
  google_generative_ai: ^0.4.0

  # Voice Agent - Text to Speech and Speech Recognition
  flutter_tts: ^4.2.5
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  geolocator: ^13.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
