name: painpal
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  image_picker: ^1.1.2
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  sqflite: ^2.4.0

  # HTTP & Networking
  dio: ^5.4.0
  web_socket_channel: ^3.0.1

  # State Management
  provider: ^6.1.0

  # Utils
  uuid: ^4.0.0
  intl: ^0.19.0

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Google Generative AI (Gemini)
  google_generative_ai: ^0.4.0

  # Voice Agent - Text to Speech and Speech Recognition
  flutter_tts: ^3.8.1

  # Local notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # PDF report generation
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
